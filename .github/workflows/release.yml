name: Release

# Build signed release APKs and attach them to a GitHub Release whenever a v* tag is pushed.
#   git tag v1.2.5 && git push origin v1.2.5
#
# Signing (optional): set these repo Secrets to sign with your release key. If absent, the
# build falls back to debug signing (installable, but only for testing — don't ship it).
#   RELEASE_KEYSTORE_BASE64  - `base64 -i app/release.keystore` output
#   RELEASE_STORE_PASSWORD
#   RELEASE_KEY_ALIAS
#   RELEASE_KEY_PASSWORD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # needed to create the Release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest  # GitHub-hosted runner already ships the Android SDK
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release signing (optional)
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KS_STORE_PW: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KS_KEY_PW: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 --decode > app/release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$KS_STORE_PW"
              echo "keyAlias=$KS_ALIAS"
              echo "keyPassword=$KS_KEY_PW"
            } > keystore.properties
            echo "Release signing configured."
          else
            echo "::warning::No RELEASE_KEYSTORE_BASE64 secret — falling back to debug signing."
          fi

      - name: Build release APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APKs to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Ship every variant: universal (any ABI), arm64-v8a (modern TVs), armeabi-v7a
          # (older 32-bit chassis), and x86_64 (emulator / x86 TV boxes).
          files: |
            app/build/outputs/apk/release/walkman-tv-*-universal-release.apk
            app/build/outputs/apk/release/walkman-tv-*-arm64-v8a-release.apk
            app/build/outputs/apk/release/walkman-tv-*-armeabi-v7a-release.apk
            app/build/outputs/apk/release/walkman-tv-*-x86_64-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
